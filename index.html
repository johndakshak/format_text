<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Formatter</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-500 min-h-screen flex items-start justify-center pt-16 px-4">

  <div class="w-full max-w-md">

    <!-- Error -->
    <div id="errorMsg" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2 mb-3">
      Field cannot be empty!
    </div>

    <!-- Input -->
    <label class="block text-xs text-gray-400 uppercase tracking-widest mb-1.5">Enter text</label>
    <input type="text" id="input" placeholder="Type something..."
    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-gray-800 placeholder-gray-300 focus:outline-none focus:border-gray-400 mb-2.5">

    <!-- Format Button -->
    <button id="format-button"
      class="w-full bg-gray-900 text-white text-sm font-medium rounded-lg py-2.5 hover:bg-gray-700 active:scale-95 transition-all mb-5">Format</button>

    <!-- Output Label -->
    <div class="text-xs text-gray-400 uppercase tracking-widest mb-2.5">Formatted output</div>

    <!-- Display -->
    <div id="display" class="flex flex-col gap-1.5 min-h-12 mb-4">
      <span class="text-sm text-gray-300">Output will appear here...</span>
    </div>

    <!-- Confirmation Panel -->
    <div id="confirmation" class="hidden flex-col gap-2 bg-gray-50 border border-gray-200 rounded-lg p-3 mb-3">
      <p class="text-sm text-gray-500">Delete the output?</p>
      <div class="flex gap-2">
        <button id="confirmed" class="flex-1 text-sm text-red-500 bg-red-50 border border-red-200 rounded-lg py-2 hover:bg-red-100 transition-all">Yes, Delete</button>
        <button id="unconfirm" class="flex-1 text-sm text-gray-400 border border-gray-200 rounded-lg py-2 hover:bg-gray-100 transition-all">Cancel</button>
      </div>
    </div>

    <!-- Delete Button -->
    <button id="delBtn"
      class="w-full text-sm text-red-400 border border-red-200 rounded-lg py-2.5 hover:bg-red-50 active:scale-95 transition-all">Delete</button>

  </div>

  <script src="main.js"></script>

</body>
</html>
